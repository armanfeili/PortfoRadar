name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }} # Ensures only one CI workflow runs at a time for a specific branch
  cancel-in-progress: true # Cancel previous runs when a new one is started

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Run on the latest Ubuntu Linux server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Check out the repository code because the server is completely blank

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Set up the Node.js environment
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint # Runs the linter to check for code style and formatting issues

      - name: Run tests with coverage
        run: npm run test:cov # If any single one of these fails, the entire GitHub Action turns red and stops.

      - name: Build
        run: npm run build # Compiles the TypeScript code into JavaScript

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test # It tells GitHub that it is strictly forbidden to start building the Docker image if the unit tests in Job 1 failed.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Check out the repository code because the server is completely blank

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Set up the Docker Buildx environment

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3 # Log in to the GitHub Container Registry
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # This step automatically generates tags for the Docker image based on the branch name and version
      # If production crashes, we can use these tags to roll back to a previous version
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }} # The name of the image
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
